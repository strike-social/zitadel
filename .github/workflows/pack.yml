name: Package und Publish Archives and Images

on:
  workflow_call:
    inputs:
      node_version:
        required: true
        type: string
      image_name_ecr_login:
        required: true
        type: string
      semantic_version:
        required: false
        type: string
    secrets:
      GH_ACTIONS_AWS_ACCESS_KEY_ID:
        description: "AWS access key ID for GitHub Actions"
        required: true
      GH_ACTIONS_AWS_SECRET_ACCESS_KEY:
        description: "AWS secret access key for GitHub Actions"
        required: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "pnpm"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: v0.28.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Pack API and Login
        env:
          ZITADEL_VERSION: ${{ inputs.semantic_version }}
        run: pnpm nx pack login
      - name: Configure AWS credentials (us-east-2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.GH_ACTIONS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.GH_ACTIONS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
          mask-aws-account-id: false

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Generate Standard Tags and Labels from the GitHub Context for the Login Container Image
        id: login-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ inputs.image_name_ecr_login }}
          tags: |
            ${{ github.sha }}
      - name: Build and Push the SHA-tagged Login Container Image
        id: build-login
        uses: docker/build-push-action@v6
        timeout-minutes: 3
        with:
          context: apps/login
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.login-meta.outputs.tags }}
